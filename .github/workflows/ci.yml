name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: "Create a release"
        type: boolean
        required: true
        default: false
      version:
        description: "Version tag to create, e.g. v0.4.0"
        type: string
        required: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck test-scripts/*.sh

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks
        run: gitleaks detect --source . --verbose

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: ./test-scripts/test-end-to-end.sh --skip-docker-integration

  docker-integration:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Docker integration tests
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
          CS_ACE_ACCESS_TOKEN: ${{ secrets.CS_ACE_ACCESS_TOKEN }}
        run: ./test-scripts/test-docker-integration.sh

  e2e-gradlew:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install nono
        run: |
          curl -sSfL https://github.com/always-further/nono/releases/download/v0.12.0/nono-v0.12.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv nono /usr/local/bin/

      - name: Create Gradle home directory
        # nono profile grants allow access to ~/.gradle but skips non-existent paths.
        # Gradle wrapper needs this directory to download and cache distributions.
        run: mkdir -p ~/.gradle

      - name: Run gradlew e2e test
        run: ./test-scripts/test-end-to-end-with-gradlew.sh --force nono container

  e2e-pytest:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install nono
        run: |
          curl -sSfL https://github.com/always-further/nono/releases/download/v0.12.0/nono-v0.12.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv nono /usr/local/bin/

      - name: Run pytest e2e test
        run: ./test-scripts/test-end-to-end-with-pytest.sh --force nono container

  release:
    runs-on: ubuntu-latest
    needs: [test, docker-integration, e2e-gradlew, e2e-pytest]
    if: github.event_name == 'workflow_dispatch' && inputs.release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next minor version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            tag="${{ inputs.version }}"
          else
            tag=$(./scripts/calculate-minor-release.sh)
          fi
          echo "tag=$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --generate-notes
