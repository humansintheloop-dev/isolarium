repos:
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: run-codescene
        name: Run CodeScene
        entry: ./codescene-precommit.sh
        language: script
        pass_filenames: false
      - id: go-vet
        name: Run go vet
        entry: go vet ./...
        language: system
        types: [go]
        pass_filenames: false
      - id: golangci-lint
        name: Run golangci-lint
        entry: golangci-lint run
        language: system
        types: [go]
        pass_filenames: false
      - id: precommit-check
        name: Run precommit checks
        entry: ./test-scripts/test-precommit.sh
        language: script
        pass_filenames: false
        files: ^(internal/|cmd/|test-scripts/|go\.(mod|sum)$|\.go$)
